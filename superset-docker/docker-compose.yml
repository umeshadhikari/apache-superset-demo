services:
  # ── PostgreSQL Database ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: demo-postgres
    restart: unless-stopped
    networks:
      - superset-net
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-demo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demo_pass}
      POSTGRES_DB: ${POSTGRES_DB:-demo_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-demo_user} -d ${POSTGRES_DB:-demo_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: demo-redis
    restart: unless-stopped
    networks:
      - superset-net
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Apache Superset ──────────────────────────────────────────
  superset:
    build:
      context: .
      dockerfile: Dockerfile.superset
    container_name: demo-superset
    restart: unless-stopped
    networks:
      - superset-net
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-a_long_random_secret_key_change_me_123}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_DB: ${POSTGRES_DB:-demo_db}
      DATABASE_USER: ${POSTGRES_USER:-demo_user}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-demo_pass}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SUPERSET_LOAD_EXAMPLES: "no"
    volumes:
      - ./superset_config.py:/app/pythonpath/superset_config.py
      - ./superset-init.sh:/app/superset-init.sh
    entrypoint: ["/bin/sh", "/app/superset-init.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  superset-net:
    driver: bridge

volumes:
  postgres_data: