server.port=8080
spring.application.name=payment-hub-backend

# Database ? PostgreSQL (Docker setup: cd superset-docker && docker compose up -d)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/demo_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:demo_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:demo_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA ? PostgreSQL dialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Seed sample data on startup ? use 'never' after first run to avoid duplicate key errors
# Set to 'always' only on a fresh database (e.g. after docker compose down -v)
spring.sql.init.mode=never

spring.jpa.defer-datasource-initialization=true

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Apache Superset integration ? override in production
superset.url=${SUPERSET_URL:http://localhost:8088}
superset.admin.username=${SUPERSET_ADMIN_USERNAME:admin}
superset.admin.password=${SUPERSET_ADMIN_PASSWORD:admin}