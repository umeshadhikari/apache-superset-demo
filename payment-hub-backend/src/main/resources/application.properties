server.port=8080
spring.application.name=payment-hub-backend

# Database — defaults to H2 in-memory for local dev without Docker.
# Override with environment variables to use PostgreSQL (see docker-compose.yml).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:paymenthub;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA — auto-detect dialect; use create-drop for H2, validate for PostgreSQL
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:create-drop}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 console — only active when using H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Seed sample data on startup
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Apache Superset integration — override in production
superset.url=${SUPERSET_URL:http://localhost:8088}
superset.admin.username=${SUPERSET_ADMIN_USERNAME:admin}
superset.admin.password=${SUPERSET_ADMIN_PASSWORD:admin}
