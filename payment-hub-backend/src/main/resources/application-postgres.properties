# PostgreSQL profile — kept for compatibility when activating via SPRING_PROFILES_ACTIVE=postgres.
# The main application.properties already defaults to PostgreSQL.

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# TODO [review]: Use the same env-var override pattern as application.properties
#   (e.g. ${SPRING_JPA_DDL_AUTO:update}) so the value can be changed without editing this file.
spring.jpa.hibernate.ddl-auto=update
