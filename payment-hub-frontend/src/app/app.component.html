<div class="app-shell">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">
        <svg viewBox="0 0 40 40" width="28" height="28" xmlns="http://www.w3.org/2000/svg">
          <circle cx="10" cy="8" r="3" fill="#4BCD3E"/>
          <circle cx="20" cy="8" r="3" fill="#4BCD3E"/>
          <circle cx="30" cy="8" r="3" fill="#4BCD3E"/>
          <text x="3" y="30" font-family="Arial,sans-serif" font-weight="800" font-size="16" fill="#fff">FIS</text>
        </svg>
      </div>
      <div class="brand-text">
        <div class="brand-name">Payment Hub</div>
        <div class="brand-sub">Powered by FIS</div>
      </div>
    </div>

    <div class="sidebar-nav">
      <!-- Home -->
      <div class="nav-section">
        <a class="nav-item" routerLink="/" [ngClass]="{'active': isActive('/') && currentRoute === '/'}">
          <span class="nav-icon">🏠</span>
          <span>Overview</span>
        </a>
      </div>

      <!-- Nav Sections -->
      <div class="nav-section" *ngFor="let section of navSections">
        <div class="nav-section-title">{{ section.title }}</div>
        <a
          class="nav-item"
          *ngFor="let item of section.items"
          [routerLink]="item.path"
          [ngClass]="{'active': isActive(item.path) && item.path !== '/'}">
          <span class="nav-icon">{{ item.icon }}</span>
          <span>{{ item.label }}</span>
        </a>
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="footer-dot"></div>
      <span>Connected</span>
      <span class="api-url">localhost:8080</span>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="main-content">
    <header class="top-bar">
      <div class="top-bar-left">
        <span class="top-bar-title">{{ getPageTitle() }}</span>
      </div>
      <div class="top-bar-right">
        <span class="fis-badge">FIS</span>
        <a href="http://localhost:8088" target="_blank" class="superset-link">
          Apache Superset
        </a>
      </div>
    </header>

    <main class="page-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
